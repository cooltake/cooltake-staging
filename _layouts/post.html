---
layout: default
---
<style>
  body { background: linear-gradient(160deg,#111b2e 0%,#0d1525 50%,#111827 100%) !important; }

  .post-header {
    background: linear-gradient(160deg,#0e1929 0%,#0b1220 60%,#101827 100%);
    padding: 0 20px !important;
    margin-bottom: 0 !important;
    border-bottom: none !important;
  }

  .post-hero-wrap {
    max-width: 1000px;
    min-height: 300px;
    margin: 0 auto;
    padding: 54px 48px 36px;
    border-radius: 14px;
    background-color: #0b1220;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .post-hero-wrap.has-image {
    background-image:
      linear-gradient(rgba(5,10,20,0.52), rgba(5,10,20,0.70)),
      var(--hero-img);
    background-size: cover;
    background-position: center center;
  }

  .back-link {
    position: absolute;
    top: 16px;
    left: 48px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: rgba(200,210,230,0.85);
    font-size: .85rem;
    font-weight: 500;
    text-decoration: none;
    transition: color .2s;
    margin-bottom: 0 !important;
  }
  .back-link:hover { color: #f1f5ff; }

  .post-hero-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 40px;
  }

  .post-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 12px !important; }
  .post-tag {
    background: rgba(59,130,246,.18); color: #93c5fd;
    border: 1px solid rgba(59,130,246,.30);
    padding: 4px 12px; border-radius: 9999px;
    font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .post-date { color: rgba(180,195,220,0.85); font-size: .82rem; }

  .post-title {
    font-family: 'Kiwi Maru','Noto Sans JP',serif;
    font-weight: 400;
    letter-spacing: .02em;
    line-height: 1.5;
    color: #f1f5ff;
    font-size: 1rem !important;
    text-shadow:
      -2px -2px 0 rgba(0,0,0,0.9),
       2px -2px 0 rgba(0,0,0,0.9),
      -2px  2px 0 rgba(0,0,0,0.9),
       2px  2px 0 rgba(0,0,0,0.9),
      -2px  0px 0 rgba(0,0,0,0.9),
       2px  0px 0 rgba(0,0,0,0.9),
       0px -2px 0 rgba(0,0,0,0.9),
       0px  2px 0 rgba(0,0,0,0.9),
      0 4px 14px rgba(0,0,0,0.8);
  }
  .title-main {
    display: block;
    font-size: clamp(1.45rem, 3.0vw, 2.2rem) !important;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .title-sub {
    display: block;
    font-size: clamp(1.1rem, 2.1vw, 1.55rem) !important;
    opacity: 0.85;
  }

  .ad-notice-hero {
    position: absolute;
    bottom: 12px;
    right: 48px;
    font-size: .72rem;
    color: rgba(180,195,220,0.65);
  }

  .post-body { padding: 8px 5% 60px; }

  .post-content {
    max-width: 100% !important;
    margin: 0 !important;
    background: #d6d5d2; color: #1c1c2e;
    border-radius: 20px;
    padding: 16px 12.5% 48px !important;
    box-shadow: 0 4px 40px rgba(0,0,0,.65);
    font-size: 1.025rem !important;
    line-height: 1.95 !important;
  }

  .post-inner {
    max-width: 1000px;
    margin: 0 auto;
  }

  .post-content h2 {
    font-size: 1.45rem; font-weight: 800; letter-spacing: -.025em;
    margin: 52px 0 16px; padding-left: 18px;
    border-left: 4px solid #3b82f6; color: #111827;
  }
  .post-content h2:first-of-type { margin-top: 0; }
  .post-content h3 {
    font-size: 1.08rem; font-weight: 700; letter-spacing: -.01em;
    margin: 36px 0 12px; color: #1d4ed8 !important;
  }
  .post-content h4 { font-size: .97rem; font-weight: 700; margin: 28px 0 10px; color: #111827; }
  .post-content p { margin-bottom: 20px; color: #374151; }
  .post-content a { color: #2563eb !important; border-bottom: 1px solid rgba(37,99,235,.25); text-decoration: none; }
  .post-content a:hover { border-color: #2563eb; }
  .post-content ul, .post-content ol { margin: 16px 0 24px 28px; }
  .post-content li { margin-bottom: 8px; color: #374151; }
  .post-content strong { color: #111827; font-weight: 700; }
  .post-content hr { border: none; border-top: 1px solid #c4c3c0; margin: 40px 0; }

  .post-content table { width: 100%; border-collapse: collapse; margin: 28px 0; font-size: .875rem; }
  .post-content th {
    background: rgba(59,130,246,.08); padding: 12px 16px;
    border: 1px solid #d1d5db !important; font-weight: 700; text-align: left; color: #111827;
  }
  .post-content td { padding: 12px 16px; border: 1px solid #d1d5db !important; color: #374151 !important; }
  .post-content tr:nth-child(even) td { background: #cccbc8 !important; }

  .post-content figure { margin: 32px 0; }
  .post-content figure img { max-width: 100%; border-radius: 10px; display: block; border: none !important; }
  .post-content figcaption { font-size: .75rem; color: #6b7280; margin-top: 8px; text-align: center; }

  .post-content blockquote {
    border-left: 4px solid #3b82f6; background: #c8c7c4;
    margin: 28px 0; padding: 16px 20px;
    border-radius: 0 8px 8px 0; color: #374151; font-style: normal;
  }

  @media (max-width: 768px) {
    .post-header { padding: 0 12px !important; }
    .post-hero-wrap { min-height: 220px; padding: 48px 24px 28px; border-radius: 10px; }
    .back-link { left: 24px; }
    .ad-notice-hero { right: 24px; font-size: .65rem; }
    .post-content { padding: 16px 6% 32px !important; border-radius: 16px; }
    .post-body { padding: 0 3% 48px; }
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var el = document.querySelector('.post-title');
    if (!el) return;
    var full = el.textContent.trim();
    var sep = ' - ';
    var idx = full.indexOf(sep);
    if (idx === -1) { sep = ' — '; idx = full.indexOf(sep); }
    if (idx > -1) {
      el.innerHTML = '<span class="title-main">' + full.slice(0, idx) + '</span>' +
                     '<span class="title-sub">' + full.slice(idx + sep.length) + '</span>';
    } else {
      el.innerHTML = '<span class="title-main">' + full + '</span>';
    }
  });
</script>

<article>
  <div class="post-header">
    <div class="post-hero-wrap{% if page.image %} has-image{% endif %}"{% if page.image %} style="--hero-img: url('{{ page.image }}');"{% endif %}>
      <a href="{{ '/#categories' | relative_url }}" class="back-link">&larr; 記事一覧に戻る</a>
      <div class="post-hero-body">
        <div class="post-meta">
          <span class="post-tag">{{ page.categories | first | default: "Guide" | upcase }}</span>
          <span class="post-date">{{ page.date | date: "%Y.%m.%d" }}</span>
        </div>
        <h1 class="post-title">{{ page.title }}</h1>
      </div>
      <p class="ad-notice-hero">本記事にはプロモーション・広告が含まれる場合があります。</p>
    </div>
  </div>
  <div class="post-body">
    <div class="post-content">
      <div class="post-inner">
        {{ content }}
      </div>
    </div>
  </div>
</article>
