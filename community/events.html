<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>イベント情報 — Cooltake Studio Community</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0e1a;--card:#0f1525;--border:rgba(255,255,255,.07);
      --text:#f1f5ff;--muted:#8896b3;--primary:#3b82f6;--secondary:#818cf8;
      --gradient:linear-gradient(135deg,#3b82f6 0%,#818cf8 100%);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scrollbar-gutter:stable;}
    body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7;}
    a{text-decoration:none;color:inherit;}
    /* HEADER */
    .site-header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
    .container-wide{max-width:1547px;margin:0 auto;padding:0 28px;}
    .site-header .container-wide{display:flex;align-items:center;justify-content:space-between;height:68px;}
    .logo{display:flex;align-items:center;gap:12px;font-size:1.05rem;font-weight:800;letter-spacing:-.02em;}
    .site-nav{display:flex;align-items:center;gap:4px;}
    .site-nav a{color:var(--muted);font-size:.875rem;font-weight:500;padding:7px 14px;border-radius:8px;transition:color .2s,background .2s;}
    .site-nav a:hover{color:var(--text);background:rgba(255,255,255,.05);}
    .site-nav a.active{color:var(--text);background:rgba(255,255,255,.04);}
    .nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;}
    .nav-toggle span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:.3s;}
    /* PAGE */
    .page-inner{max-width:1080px;margin:0 auto;padding:48px 28px 80px;}
    /* HERO */
    .hero{margin-bottom:40px;}
    .hero-eyebrow{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:10px;}
    .hero h1{font-size:clamp(1.6rem,3.5vw,2.25rem);font-weight:900;margin-bottom:10px;}
    .hero p{color:var(--muted);max-width:540px;}
    .hero-actions{display:flex;align-items:center;gap:12px;margin-top:20px;flex-wrap:wrap;}
    .btn-cta{background:var(--gradient);color:#fff;padding:10px 22px;border-radius:9999px;font-size:.875rem;font-weight:700;transition:opacity .2s;white-space:nowrap;}
    .btn-cta:hover{opacity:.85;}
    .btn-outline{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);padding:10px 18px;border-radius:9999px;font-size:.875rem;font-weight:600;transition:.2s;white-space:nowrap;}
    .btn-outline:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
    /* FILTERS */
    .filter-row{display:flex;align-items:center;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
    .filter-chip{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:9999px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s;user-select:none;}
    .filter-chip:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
    .filter-chip.active{background:rgba(59,130,246,.12);border-color:var(--primary);color:var(--primary);}
    .filter-sep{width:1px;height:18px;background:var(--border);}
    /* CALENDAR HEADER */
    .month-group{margin-bottom:40px;}
    .month-label{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    /* CARD */
    .event-card{background:var(--card);border:1px solid var(--border);border-radius:20px;display:flex;gap:0;overflow:hidden;transition:border-color .2s,transform .2s;margin-bottom:16px;}
    .event-card:hover{border-color:rgba(59,130,246,.3);transform:translateY(-2px);}
    .event-date-col{background:rgba(59,130,246,.07);border-right:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:76px;text-align:center;flex-shrink:0;}
    .event-month{font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.06em;}
    .event-day{font-size:2rem;font-weight:900;line-height:1;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .event-dow{font-size:.72rem;color:var(--muted);font-weight:600;}
    .event-body{padding:20px 24px;flex:1;min-width:0;}
    .event-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
    .event-title{font-size:1.05rem;font-weight:700;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex:1;}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
    .badge-blue{background:rgba(59,130,246,.14);color:#93c5fd;}
    .badge-purple{background:rgba(129,140,248,.14);color:#a5b4fc;}
    .badge-green{background:rgba(34,197,94,.14);color:#86efac;}
    .badge-orange{background:rgba(251,146,60,.14);color:#fdba74;}
    .event-meta{display:flex;align-items:center;gap:12px;font-size:.8rem;color:var(--muted);flex-wrap:wrap;margin-bottom:8px;}
    .event-desc{font-size:.85rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.6;margin-bottom:10px;}
    .event-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
    .event-tags{display:flex;gap:6px;flex-wrap:wrap;}
    .tag{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.73rem;color:var(--muted);}
    .tag-free{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2);color:#86efac;}
    .tag-paid{background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.2);color:#fdba74;}
    .tag-drink{background:rgba(250,204,21,.08);border-color:rgba(250,204,21,.2);color:#fde68a;}
    .group-link{font-size:.78rem;color:var(--secondary);font-weight:600;background:rgba(129,140,248,.08);padding:4px 10px;border-radius:6px;transition:.2s;}
    .group-link:hover{background:rgba(129,140,248,.18);}
    .contact-btn{background:var(--gradient);color:#fff;padding:7px 16px;border-radius:9999px;font-size:.8rem;font-weight:700;transition:opacity .2s;cursor:pointer;border:none;white-space:nowrap;}
    .contact-btn:hover{opacity:.85;}
    /* TODAY MARKER */
    .today-marker{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:.8rem;color:var(--muted);}
    .today-marker::before,.today-marker::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.3));}
    .today-marker::after{background:linear-gradient(270deg,transparent,rgba(59,130,246,.3));}
    /* LOAD MORE */
    .load-more-wrap{text-align:center;margin-top:40px;}
    .btn-load{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);padding:12px 32px;border-radius:9999px;font-size:.875rem;font-weight:600;cursor:pointer;transition:.2s;}
    .btn-load:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
    /* EMPTY / LOADING */
    .state-box{text-align:center;padding:80px 20px;color:var(--muted);}
    .state-box .icon{font-size:3rem;margin-bottom:16px;}
    .state-box h3{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:8px;}
    .spinner{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* FOOTER */
    footer{text-align:center;padding:32px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);}
    @media(max-width:768px){
      .container-wide{padding:0 16px;}
      .nav-toggle{display:flex;}
      .site-nav{display:none;flex-direction:column;gap:0;position:absolute;top:68px;left:0;right:0;background:rgba(10,14,26,.97);border-bottom:1px solid var(--border);padding:8px 0;z-index:99;}
      .site-nav.open{display:flex;}
      .site-nav a{padding:13px 20px;border-radius:0;display:block;}
      .page-inner{padding:32px 16px 64px;}
      .event-card{flex-direction:column;}
      .event-date-col{flex-direction:row;justify-content:flex-start;gap:12px;min-width:auto;padding:14px 20px;border-right:none;border-bottom:1px solid var(--border);}
      .event-day{font-size:1.4rem;}
    }
  </style>
</head>

<script>
const WORKER = 'https://cooltake-showcase.cooltakestudio.workers.dev';
const PAGE_SIZE = 15;
let allItems = [];
let filtered = [];
let displayed = 0;
let activeType = 'all';
let activeFmt = null;
let activeFee = null;

const DOW = ['日','月','火','水','木','金','土'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatEventDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return { month: MONTHS[d.getMonth()], day: d.getDate(), dow: DOW[d.getDay()], full: d };
}

function monthKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月`;
}

function fmtBadge(format) {
  if (format === 'オンライン') return '<span class="badge badge-blue">💻 オンライン</span>';
  if (format === 'ハイブリッド') return '<span class="badge badge-purple">🌐 ハイブリッド</span>';
  return '<span class="badge badge-green">📍 会場</span>';
}

function feeBadge(fee_type, fee_amount, drink_fee) {
  if (fee_type === '無料') return '<span class="tag tag-free">無料</span>';
  if (fee_type === 'ワンドリンク制（入場無料）') {
    const d = drink_fee ? ` ${esc(drink_fee)}` : '';
    return `<span class="tag tag-drink">🍺 ワンドリンク制${d}</span>`;
  }
  if (fee_type === '有料＋ワンドリンク制') {
    const parts = [];
    if (fee_amount) parts.push(`¥ ${esc(fee_amount)}`);
    if (drink_fee)  parts.push(`🍺 ${esc(drink_fee)}`);
    else            parts.push('🍺 ワンドリンク');
    return parts.map(p => `<span class="tag tag-paid">${p}</span>`).join('');
  }
  if (fee_amount) return `<span class="tag tag-paid">¥ ${esc(fee_amount)}</span>`;
  return '<span class="tag tag-paid">有料</span>';
}

function renderCard(ev) {
  const { month, day, dow } = formatEventDate(ev.event_date);
  const timeStr = ev.event_time ? ` ${ev.event_time}〜` : '';
  const locationStr = ev.format === 'オンライン' ? 'オンライン' : (ev.region || '');
  return `
  <div class="event-card">
    <div class="event-date-col">
      <div class="event-month">${month}</div>
      <div class="event-day">${day}</div>
      <div class="event-dow">${dow}曜</div>
    </div>
    <div class="event-body">
      <div class="event-head">
        <div class="event-title">${esc(ev.title)}</div>
        ${fmtBadge(ev.format||'')}
      </div>
      <div class="event-meta">
        <span>🕐 ${esc(ev.event_date)}${esc(timeStr)}</span>
        ${locationStr ? `<span>📍 ${esc(locationStr)}</span>` : ''}
        ${ev.venue ? `<span>🏠 ${esc(ev.venue)}</span>` : ''}
        ${ev.capacity ? `<span>👤 ${esc(ev.capacity)}</span>` : ''}
      </div>
      <div class="event-desc">${esc(ev.description||'')}</div>
      <div class="event-footer">
        <div class="event-tags">
          <span class="tag">${esc(ev.event_type||'')}</span>
          ${feeBadge(ev.fee_type, ev.fee_amount, ev.drink_fee)}
          ${ev.group_name ? `<a href="/community/group.html?name=${encodeURIComponent(ev.group_name)}" class="group-link">🎵 ${esc(ev.group_name)}</a>` : ''}
        </div>
        <button class="contact-btn" onclick="showContact(event,'${esc(ev.contact||'')}')">詳細・申込</button>
      </div>
    </div>
  </div>`;
}

function showContact(e, contact) {
  e.preventDefault();
  alert('📬 申込・連絡先\n\n' + contact);
}

function groupByMonth(items) {
  const groups = {};
  const order = [];
  items.forEach(ev => {
    const key = monthKey(ev.event_date);
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(ev);
  });
  return { groups, order };
}

function renderAll() {
  const c = document.getElementById('events-container');
  if (filtered.length === 0) {
    c.style.display = 'none';
    document.getElementById('state-empty').style.display = 'block';
    return;
  }
  document.getElementById('state-empty').style.display = 'none';
  c.style.display = 'block';
  const { groups, order } = groupByMonth(filtered);
  c.innerHTML = order.map(key => `
    <div class="month-group">
      <div class="month-label">${esc(key)}</div>
      ${groups[key].map(renderCard).join('')}
    </div>`).join('');
}

function applyFilters() {
  filtered = allItems.filter(ev => {
    const typeOk = activeType === 'all' || (ev.event_type||'') === activeType;
    const fmtOk = !activeFmt || (ev.format||'') === activeFmt;
    const feeOk = !activeFee || (ev.fee_type||'') === activeFee;
    return typeOk && fmtOk && feeOk;
  });
  renderAll();
}

function setTypeFilter(type, el) {
  document.querySelectorAll('[data-filter]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeType = type;
  applyFilters();
}

function setFmtFilter(fmt, el) {
  const isActive = el.classList.contains('active');
  document.querySelectorAll('[data-filter-fmt]').forEach(c => c.classList.remove('active'));
  activeFmt = isActive ? null : fmt;
  if (!isActive) el.classList.add('active');
  applyFilters();
}

function setFeeFilter(fee, el) {
  const isActive = el.classList.contains('active');
  document.querySelectorAll('[data-filter-fmt="無料"]').forEach(c => c.classList.remove('active'));
  activeFee = isActive ? null : fee;
  if (!isActive) el.classList.add('active');
  applyFilters();
}

async function init() {
  try {
    const r = await fetch(`${WORKER}?action=get_events`);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    allItems = (d.events || []).sort((a,b) => a.event_date.localeCompare(b.event_date));
    document.getElementById('state-loading').style.display = 'none';
    applyFilters();
  } catch(e) {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-error').style.display = 'block';
    console.error(e);
  }
}

init();
</script>
